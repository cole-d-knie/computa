version: "1.0.0"
title: "Swarm Verify"
description: "Execute a task with phased planning, TDD, runtime QA, audit ledgers, and adversarial plus judge verification loops."
parameters:
  - key: task
    input_type: string
    description: "The task to execute."
    requirement: required
extensions:
  - type: builtin
    name: developer
    timeout: 600
    bundled: true
    description: "File system and shell access for implementation and verification."
  - type: stdio
    name: context7
    cmd: npx
    args:
      - "-y"
      - "@upstash/context7-mcp"
    timeout: 300
    description: "Current library, framework, API, CLI, and harness documentation."
  - type: stdio
    name: playwright
    cmd: npx
    args:
      - "-y"
      - "@playwright/mcp@latest"
    timeout: 300
    description: "Browser automation for runtime QA and UI verification."
instructions: |
  Execute the user's task with strict evidence-first verification.

  Task:
  {{ task }}

  Rules:
  - Immediately save the raw task to an external user-task.md before summarizing or planning from memory.
  - Create all plan, phase, task, subtask, issue, blocker, evidence, and report artifacts outside the repo.
  - When any swarm-verify phase or subworkflow is run independently, use the same available dependency capabilities: terse communication, planning, TDD, investigation, parallel agents, adversarial review, completion verification, Playwright/browser QA, and Context7/current docs.
  - Phase 0: create plan.md, master-task-ledger.csv, issue/blocker ledgers, phase directories, task directories, subtask ledgers, maps/, and reports/.
  - Phase 1: run an orientation audit before implementation. Create maps/map-index.md, task-scope-map.md, codebase-map.md, flow-map.md, test-and-command-map.md, risk-map.md, map-change-log.md, and map-change-ledger.csv.
  - Phase 2: investigate before implementation. Reference and update maps; verify source truth, current behavior, expected behavior, issue origin, edge cases, coverage gaps, baseline commands, and failing evidence.
  - Use TDD for behavior changes: failing test first, smallest fix, passing test after.
  - Run unit, integration, smoke, runtime, and browser-visible QA as relevant.
  - Use Goose recipes, extensions, or independent sessions for safe parallel review only. Do not parallelize overlapping files, shared runtime state, dashboards, databases, deployments, migrations, or dependent subtasks.
  - After every task, run one adversarial review per subtask and one judge/verifier review per subtask. Only implement approved recommendations.
  - After every phase, run one adversarial review per task and one judge/verifier review per task. Do not close a phase until approved complete, approved deferred, or blocked with evidence.
  - Keep ledgers and maps current. Maps may change at any time as work reveals new information; track every material map update in both maps/map-change-log.md and maps/map-change-ledger.csv. Mark work done only after evidence exists.
  - Create final reports: final-summary.md, verification-needed.md, blockers-and-open-issues.md, task-gap-analysis.md, map-artifacts.md, and new-issues-found.md.
  - Make one commit per completed task only after verification passes and commits are allowed.
  - Do not push unless explicitly asked.

  Golden rule: evidence before assertions. Never say "it works" without verification command output and runtime proof.
prompt: |
  Start Swarm Verify for: {{ task }}
